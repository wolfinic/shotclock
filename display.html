<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>ProShotClock — External Display</title>
  <link rel="icon" type="image/png" href="https://i.ibb.co/RHPDGYy/24-2-1.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: #000;
      overflow: hidden;
      cursor: none;
    }

    .display {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .stop-lamp {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 14vh;
      background: #ff7a00;
      box-shadow: 0 0 60px 10px rgba(255, 122, 0, 0.8);
      opacity: 0;
      transition: opacity 0.1s linear;
    }
    .stop-lamp.active { opacity: 1; }

    .digits {
      font-family: "Orbitron", "DSEG7", ui-monospace, "SF Mono", Menlo, monospace;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      font-size: min(70vh, 55vw);
      line-height: 1;
      color: #ff2d2d;
      text-shadow: 0 0 25px rgba(255, 45, 45, 0.65), 0 0 60px rgba(255, 45, 45, 0.35);
      letter-spacing: 0.02em;
    }
    .digits.warning { color: #ffb000; text-shadow: 0 0 25px rgba(255, 176, 0, 0.6), 0 0 60px rgba(255, 176, 0, 0.3); }

    /* FIBA "still alive" dot shown when the display is blanked */
    .blank-dot {
      width: 2.2vh;
      height: 2.2vh;
      border-radius: 50%;
      background: #ff2d2d;
      box-shadow: 0 0 18px rgba(255, 45, 45, 0.8);
      display: none;
    }
    .blank-dot.visible { display: block; }

    .audio-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      cursor: pointer;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #fff;
      text-align: center;
      padding: 2rem;
    }
    .audio-overlay h2 { font-size: clamp(1.5rem, 5vw, 2.5rem); margin-bottom: 1rem; }
    .audio-overlay p { font-size: clamp(0.9rem, 3vw, 1.3rem); color: #aaa; }
    .audio-overlay.hidden { display: none; }

    .hint {
      position: absolute;
      bottom: 1.5vh;
      left: 0;
      width: 100%;
      text-align: center;
      color: #444;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 0.8rem;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    .display:hover .hint { opacity: 1; }
  </style>
</head>
<body>
  <div class="display" id="display">
    <div class="stop-lamp" id="stop-lamp"></div>
    <div class="digits" id="digits">24</div>
    <div class="blank-dot" id="blank-dot"></div>

    <div class="audio-overlay" id="audio-overlay">
      <div>
        <h2>🔊 Click to enable sound</h2>
        <p>Click anywhere to activate the buzzer, then position this window full-screen.</p>
      </div>
    </div>

    <div class="hint" id="hint">Double-click for full screen · waiting for the control window…</div>
  </div>

  <audio id="siren" src="siren.mp3" preload="auto"></audio>

  <script>
    const digitsEl  = document.getElementById('digits');
    const stopLamp  = document.getElementById('stop-lamp');
    const blankDot  = document.getElementById('blank-dot');
    const overlay   = document.getElementById('audio-overlay');
    const hint      = document.getElementById('hint');
    const siren     = document.getElementById('siren');
    const display   = document.getElementById('display');

    const DEFAULTS = { time1: 24, time2: 14, showDecimals: true, blankAtFull: false };

    let state = { time: 24, running: false, blank: false, settings: { ...DEFAULTS } };
    let audioEnabled = false;
    let hasPlayedHorn = false;
    let connected = false;

    // ---- Audio gate (browsers block autoplay until a user gesture) ----
    overlay.addEventListener('click', () => {
      siren.play().then(() => {
        siren.pause();
        siren.currentTime = 0;
        audioEnabled = true;
        overlay.classList.add('hidden');
      }).catch(() => { /* will retry on next gesture */ });
    });

    // ---- Full screen on double-click ----
    display.addEventListener('dblclick', () => {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
      else document.exitFullscreen().catch(() => {});
    });

    function playHorn() {
      if (!audioEnabled) { overlay.classList.remove('hidden'); return; }
      siren.currentTime = 0;
      siren.volume = 1.0;
      siren.play().catch(() => {});
    }

    function render() {
      const s = state.settings || DEFAULTS;
      const t = Math.max(0, state.time);

      // Buzzer + stop-lamp at expiry
      if (t <= 0.05) {
        stopLamp.classList.add('active');
        if (!hasPlayedHorn) { playHorn(); hasPlayedHorn = true; }
      } else {
        stopLamp.classList.remove('active');
        hasPlayedHorn = false;
      }

      // Blank: manual (↑ on console) or FIBA auto-blank at/above full
      const autoBlank = s.blankAtFull && t >= (s.time1 - 0.05);
      if (state.blank || autoBlank) {
        digitsEl.textContent = '';
        blankDot.classList.add('visible');
        return;
      }
      blankDot.classList.remove('visible');

      // Colour: amber under 10s, red under 5s / expired
      digitsEl.classList.toggle('warning', t > 5 && t <= 10);

      if (s.showDecimals && t <= 5) {
        digitsEl.textContent = t.toFixed(1);
      } else if (s.showDecimals) {
        digitsEl.textContent = Math.floor(t);
      } else {
        digitsEl.textContent = Math.ceil(t);
      }
    }

    function apply(data) {
      if (!data) return;
      connected = true;
      hint.textContent = 'Double-click for full screen';
      state = {
        time: typeof data.time === 'number' ? data.time : state.time,
        running: !!data.running,
        blank: !!data.blank,
        settings: data.settings || state.settings
      };
      render();
    }

    // ---- Initial state from localStorage (BroadcastChannel doesn't replay) ----
    try {
      const saved = JSON.parse(localStorage.getItem('proshotclock:state') || 'null');
      if (saved) apply(saved);
    } catch (e) { /* ignore */ }

    // ---- Live sync via BroadcastChannel, with a storage-event fallback ----
    let channel = null;
    if ('BroadcastChannel' in window) {
      channel = new BroadcastChannel('proshotclock');
      channel.onmessage = (ev) => apply(ev.data);
    }
    window.addEventListener('storage', (ev) => {
      if (ev.key === 'proshotclock:state' && ev.newValue) {
        try { apply(JSON.parse(ev.newValue)); } catch (e) {}
      }
    });

    render();
  </script>
</body>
</html>
